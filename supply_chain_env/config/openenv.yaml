name: SupplyChainEnv
description: A production-grade supply chain inventory optimization environment for OpenEnv
version: 1.0.0

observation_space:
  type: object
  properties:
    inventory:
      type: integer
      description: Current inventory level after sales
    demand:
      type: integer
      description: Customer demand for current step
  required:
    - inventory
    - demand

action_space:
  type: string
  enum:
    - order_small
    - order_large
    - do_nothing

reward:
  type: float
  description: Profit from sales minus holding costs and stockout penalties

episode:
  max_steps: 30
  initial_inventory: 1500
  initial_money: 10000

tasks:
  easy:
    description: Minimize stockouts using basic ordering policy
    objective: maximize fulfillment
  medium:
    description: Balance inventory to reduce stockouts and overstock
    objective: minimize total penalty
  hard:
    description: Maximize total profit over the episode
    objective: maximize profit

parameters:
  order_small_amount: 50
  order_large_amount: 150
  holding_cost_per_unit: 0.1
  stockout_penalty_per_unit: 5.0
  price_per_unit: 10
