name: supply-chain-env
version: "1.0.0"
description: Supply Chain Management AI Agent Environment

tasks:
  - name: easy
    description: Stable demand, minimize stockouts using basic ordering policy
  - name: medium
    description: Balance inventory to reduce stockouts and overstock
  - name: hard
    description: Maximize total profit over the episode

endpoints:
  reset: /reset
  step: /step
  state: /state

action_space:
  type: discrete
  actions:
    - order_small
    - order_large
    - do_nothing

observation_space:
  inventory: int
  demand: int

episode:
  max_steps: 30
  initial_inventory: 1500
  initial_money: 10000
